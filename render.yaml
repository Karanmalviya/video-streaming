services:
  - type: web
    name: video-streaming-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: uploads
      - key: CLIENT_URL
        sync: false
    disk:
      name: video-storage
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
